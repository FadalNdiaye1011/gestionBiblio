apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-biblio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestion-biblio
  template:
    metadata:
      labels:
        app: gestion-biblio
    spec:
      containers:
        - name: gestion-biblio
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8000
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/gestionBiblio?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: SERVER_PORT
              value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: gestion-biblio
spec:
  type: NodePort
  selector:
    app: gestion-biblio
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30081
